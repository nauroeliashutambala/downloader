<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidown API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero card reveal-1">
      <p class="tag">Video Downloader</p>
      <h1>Baixe videos com um link</h1>
      <p class="subtitle">Cole a URL do video e a API faz o download para voce.</p>
    </section>

    <section class="card reveal-2">
      <form id="download-form" class="form">
        <label for="url">Link do video</label>
        <input id="url" name="url" type="url" placeholder="https://..." required>
        <button id="submit-btn" type="submit">Baixar</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section id="result" class="card result hidden reveal-3">
      <h2>Resultado</h2>
      <dl>
        <div><dt>Titulo</dt><dd id="r-title">-</dd></div>
        <div><dt>Extractor</dt><dd id="r-extractor">-</dd></div>
        <div><dt>Duracao</dt><dd id="r-duration">-</dd></div>
        <div><dt>Arquivo</dt><dd id="r-filename">-</dd></div>
      </dl>
      <a id="file-link" href="#" class="download-link" target="_blank" rel="noopener">Baixar arquivo</a>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
